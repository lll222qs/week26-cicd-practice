
# hello-deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: my-hello-app:v1 # 使用我们刚加载的镜像
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: hello-app-service
spec:
  type: NodePort # 这会给我们一个可从外部访问的端口
  selector:
    app: hello-app
  ports:
    - protocol: TCP
      port: 80      # Service 的端口
