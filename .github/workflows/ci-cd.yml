name: MLOps Minimal CI/CD

# 触发条件：当 main 分支有 push 或 pull request 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- 阶段 1: CI (持续集成) - 跑测试 ---
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # 对应你的 Dockerfile 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装核心依赖
          pip install -r requirements.txt
          # 单独安装测试工具（因为它们不在你的 requirements.txt 里）
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # 停止构建如果发现有错误
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Test with pytest
        run: |
          # 运行 tests 目录下的测试
          pytest tests/ -v

  # --- 阶段 2: CD (持续交付) - 构建 Docker ---
  build-docker:
    needs: test-and-lint # 必须等上面测试通过了才跑这一步
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          # 尝试构建镜像，验证 Dockerfile 是否有效
          docker build -t minimal-demo-app .
          
      - name: Run Container Check
        run: |
          # 简单跑一下容器，看能不能启动（可选）
          docker run -d --name test-container -p 8000:8000 minimal-demo-app
          sleep 5 
          # 检查容器状态
          docker ps | grep test-container || (echo "Container failed to start" && exit 1)
          docker stop test-container