name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 任务1：代码检查与单元测试
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            # 先安装核心依赖
            pip install -r requirements.txt
            # 强制安装测试工具，防止 requirements.txt 里漏了
            pip install pytest flake8
          
      - name: Run Tests
        run: pytest

  # 任务2：构建并推送 Docker 镜像
  build-and-push:
    needs: test  # 只有测试通过了，才会执行这个任务
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 允许写入 GitHub 容器仓库

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动生成的安全令牌

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/week26-app:latest