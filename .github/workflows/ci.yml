name: Week26 Python CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ===== 原有的测试任务（保持不变）=====
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🌿 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: 🔍 Lint with Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🧪 Test with Pytest
        run: |
          pytest

  # ===== 新增：Docker 构建与推送（仅在 push 到 main 时触发）=====
  build-and-push:
    # 只在 push 到 main 时运行（避免 PR 也推镜像）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test  # ← 确保测试通过后再构建
    permissions:
      contents: read
      packages: write  # 必须！用于访问 GHCR

    steps:
      - name: 🌿 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/week26-app:latest
            ghcr.io/${{ github.repository_owner }}/week26-app:${{ github.sha }}